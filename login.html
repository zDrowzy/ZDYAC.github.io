<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZDYAC — Acceso staff</title>
<link rel="stylesheet" href="./assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .card-header { text-align: center; margin-bottom: 6px; }
  .card-header .radar { margin: 0 auto 14px; width: 30px; height: 30px; }
  .card h1 {
    font-size: 28px;
    line-height: 1.15;
    margin: 0;
    letter-spacing: 0.2px;
    font-weight: 500;
  }
  .card h1 strong {
    display: block;
    color: var(--brand);
    font-weight: 700;
  }
  .card p.sub {
    color: var(--dim);
    font-size: 13px;
    text-align: center;
    margin: 10px 0 28px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.2px;
    margin-bottom: 7px;
    margin-top: 16px;
  }
  input { padding: 12px 14px; border-radius: 8px; }
  #error {
    color: var(--danger);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    margin-top: 14px;
    min-height: 16px;
    text-align: center;
  }
  button.primary {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    border-radius: 8px;
    font-size: 14.5px;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 26px 0 18px;
  }
  .footNote {
    text-align: center;
    color: var(--dim);
    font-size: 12.5px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-header">
        <div class="radar"></div>
        <h1>Iniciar sesión en<strong>ZDYAC</strong></h1>
      </div>
      <p class="sub">Bienvenido de nuevo al sistema de detección<br>del servidor.</p>

      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="username" placeholder="tu@email.com">

        <label for="password">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password" placeholder="Tu contraseña">

        <button class="primary" type="submit">Ingresar</button>
        <div id="error"></div>
      </form>

      <hr class="divider">
      <p class="footNote">Acceso solo para staff autorizado.<br>¿No podés entrar? Contactá a un administrador.</p>
    </div>
  </div>

<script>
  const supabaseClient = window.supabase.createClient(
    window.ZDYAC_CONFIG.SUPABASE_URL,
    window.ZDYAC_CONFIG.SUPABASE_ANON_KEY
  );

  // Si ya hay sesión activa, directo a la dashboard
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "./dashboard/index.html";
  });

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = "Acceso denegado: credenciales inválidas.";
      return;
    }

    window.location.href = "./dashboard/index.html";
  });
</script>
</body>
</html>
